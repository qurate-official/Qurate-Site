<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing — Qurate</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a class="logo" href="dashboard.html">
          <img class="logo-img" src="../items/logo.jpeg" alt="Logo"/>
        </a>
        <div class="nav-actions">
          <a class="btn btn-outline btn-sm" href="dashboard.html">Back to Dashboard</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container" style="max-width: 680px; padding-top: 2rem; padding-bottom: 3rem;">
    <div class="page-header">
      <h1 class="page-title">List an Item</h1>
      <p class="page-sub">Fill in the details to post your item to the campus marketplace.</p>
    </div>

    <form id="creationForm" onsubmit="event.preventDefault();">

      <!-- Image upload -->
      <div class="form-group">
        <label class="label">Photos (JPEG / JPG / PNG)</label>
        <input type="file" id="imgInput" accept=".jpg,.jpeg,.png" multiple
          style="display:none;" onchange="handleImagePick(this)">
        <div id="imgDropZone"
          onclick="document.getElementById('imgInput').click()"
          style="border:2px dashed var(--border-strong,#aac);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:#f8fbff;transition:background 0.2s;"
          onmouseover="this.style.background='#edf4ff'"
          onmouseout="this.style.background='#f8fbff'">
          <p style="margin:0;color:#1252a3;font-weight:600;" id="dropZoneLabel">Click to select images</p>
          <p style="margin:0.25rem 0 0;font-size:0.8rem;color:#666;">Up to 4 files · JPG or PNG · taken within last 14 days</p>
        </div>
        <div id="imgPreviewRow" style="display:none;margin-top:0.75rem;gap:0.5rem;flex-wrap:wrap;"></div>
        <div id="imgDateErrors" style="margin-top:0.5rem;"></div>
      </div>

      <div class="form-group">
        <label class="label">Title *</label>
        <input class="input" id="titleInput" required placeholder="e.g., Mechanical Keyboard">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="label">Category *</label>
          <select class="select" id="categoryInput" required>
            <option value="Textbooks">Textbooks</option>
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Furniture</option>
            <option value="Appliances">Appliances</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Price (₹) *</label>
          <input class="input" type="number" id="priceInput" required placeholder="500">
        </div>
      </div>

      <div class="form-group">
        <label class="label">Description / Condition</label>
        <textarea class="textarea" id="descInput" placeholder="Describe condition, dimensions, any wear..."></textarea>
      </div>

      <div class="form-group">
        <button type="button" class="btn btn-outline w-full" id="scanBtn">Run AI Quality Scan</button>
        <div id="aiOutputZone"></div>
      </div>

      <div class="sep"></div>

      <div class="flex gap-2" style="justify-content: flex-end;">
        <a class="btn btn-outline" href="dashboard.html">Cancel</a>
        <button type="submit" class="btn btn-primary" id="publishBtn" disabled>Publish Listing</button>
      </div>
    </form>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="supabaseClient.js"></script>
  <script>
    // ← replace with your Supabase project ref (Settings → General → Reference ID)
    const SUPABASE_PROJECT_REF = 'wppqwnxtojovegfcdewr';

    let currentUser = null;
    let pickedFiles = [];
    let scanPassed  = false;
    let aiScore     = null;

    const MAX_AGE_DAYS = 14;

    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = await checkUserSession();
      lucide.createIcons();
      document.getElementById('scanBtn').addEventListener('click', runScan);
      document.getElementById('creationForm').addEventListener('submit', publishListing);
    });

    // ── Helpers ───────────────────────────────────────────────────
    function daysBetween(date, now) {
      return (now - date) / (1000 * 60 * 60 * 24);
    }

    async function getExifDate(file) {
      try {
        const exif = await exifr.parse(file, ['DateTimeOriginal', 'DateTimeDigitized', 'DateTime']);
        return exif?.DateTimeOriginal ?? exif?.DateTimeDigitized ?? exif?.DateTime ?? null;
      } catch {
        return null;
      }
    }

    async function getBestDate(file) {
      const exifDate = await getExifDate(file);
      if (exifDate !== null) return { date: exifDate, source: 'exif' };
      return { date: new Date(file.lastModified), source: 'modified' };
    }

    function updateDropZoneLabel() {
      const remaining = 4 - pickedFiles.length;
      const label = document.getElementById('dropZoneLabel');
      if (remaining <= 0) {
        label.textContent = 'Maximum 4 photos added';
      } else {
        label.textContent = remaining === 4
          ? 'Click to select images'
          : `Click to add more (${remaining} slot${remaining > 1 ? 's' : ''} left)`;
      }
      const zone = document.getElementById('imgDropZone');
      zone.style.pointerEvents = remaining <= 0 ? 'none' : 'auto';
      zone.style.opacity       = remaining <= 0 ? '0.5' : '1';
    }

    // ── Image picker with date validation ────────────────────────
    async function handleImagePick(input) {
      const slots = 4 - pickedFiles.length;
      const files = Array.from(input.files).slice(0, slots);
      const now   = new Date();

      const errorsBlock = document.getElementById('imgDateErrors');
      errorsBlock.innerHTML = '';

      scanPassed = false;
      document.getElementById('publishBtn').setAttribute('disabled', true);
      document.getElementById('aiOutputZone').innerHTML = '';

      const errors = [];

      for (const file of files) {
        const { date, source } = await getBestDate(file);
        const ageDays = daysBetween(date, now);

        if (ageDays > MAX_AGE_DAYS) {
          const taken = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
          const label = source === 'exif' ? 'taken' : 'last modified';
          errors.push(`<span style="color:#b91c1c;">✕ <strong>${file.name}</strong>: Photo ${label} on ${taken} — must be within the last 14 days.</span>`);
        } else {
          pickedFiles.push(file);
        }
      }

      errorsBlock.innerHTML = errors.join('<br>');
      renderPreviews();
      updateDropZoneLabel();
      input.value = '';
    }

    // ── Preview rendering ─────────────────────────────────────────
    function renderPreviews() {
      const previewRow = document.getElementById('imgPreviewRow');
      previewRow.innerHTML = '';
      previewRow.style.display = pickedFiles.length ? 'flex' : 'none';
      pickedFiles.forEach((file, idx) => appendPreview(previewRow, file, idx));
    }

    function removeFile(idx) {
      pickedFiles.splice(idx, 1);
      scanPassed = false;
      document.getElementById('publishBtn').setAttribute('disabled', true);
      document.getElementById('aiOutputZone').innerHTML = '';
      renderPreviews();
      updateDropZoneLabel();
    }

    function appendPreview(container, file, idx) {
      const url     = URL.createObjectURL(file);
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;display:inline-block;width:80px;height:80px;';

      const img = document.createElement('img');
      img.src   = url;
      img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #6ee7b7;display:block;';

      const btn = document.createElement('button');
      btn.type        = 'button';
      btn.textContent = '✕';
      btn.title       = 'Remove photo';
      btn.setAttribute('aria-label', `Remove ${file.name}`);
      btn.style.cssText = [
        'position:absolute;top:3px;right:3px;',
        'width:20px;height:20px;padding:0;',
        'border-radius:50%;border:none;cursor:pointer;',
        'background:rgba(0,0,0,0.65);color:#fff;',
        'font-size:10px;font-weight:700;line-height:20px;text-align:center;',
        'opacity:0;transition:opacity 0.15s;',
      ].join('');

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeFile(idx);
      });

      wrapper.addEventListener('mouseenter', () => { btn.style.opacity = '1'; });
      wrapper.addEventListener('mouseleave', () => { btn.style.opacity = '0'; });

      wrapper.appendChild(img);
      wrapper.appendChild(btn);
      container.appendChild(wrapper);
    }

    // ── Base64 helper ─────────────────────────────────────────────
    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ── AI scan via Supabase Edge Function ────────────────────────
    async function runScan() {
      if (pickedFiles.length === 0) {
        toast("Add at least one valid image before scanning.", 'error');
        return;
      }

      scanPassed = false;
      document.getElementById('publishBtn').setAttribute('disabled', true);

      const zone = document.getElementById('aiOutputZone');
      zone.innerHTML = `
        <div class="ai-panel" style="margin-top:0.75rem;">
          <p style="font-weight:600;color:var(--navy,#072050);margin:0 0 0.5rem;">Scanning image quality…</p>
          <div class="progress" style="background:#dde8f7;border-radius:99px;height:6px;overflow:hidden;">
            <div id="scanBar" style="width:0%;height:100%;background:#1252a3;border-radius:99px;transition:width 2.5s linear;"></div>
          </div>
        </div>`;

      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById('scanBar').style.width = '100%';
      }));

      try {
        const images = await Promise.all(pickedFiles.map(async (file) => ({
          b64:  await fileToBase64(file),
          mime: file.type
        })));

        const { data: { session } } = await sbClient.auth.getSession();

        const response = await fetch(
          `https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/ai-scan`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({ images })
          }
        );

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Scan request failed');
        }

        const { score } = await response.json();
        aiScore = score;

        if (isNaN(aiScore) || aiScore < 0 || aiScore > 100) {
          throw new Error(`Unexpected score: "${aiScore}"`);
        }

        scanPassed = true;
        zone.innerHTML = `
          <div class="ai-panel" style="margin-top:0.75rem;display:flex;align-items:center;gap:1rem;">
            <div style="font-size:2rem;font-weight:800;color:#0b3a79;line-height:1;">${aiScore}<span style="font-size:1rem;font-weight:500;color:#1252a3;">/100</span></div>
            <div>
              <p style="font-weight:700;color:#0b3a79;margin:0;">✓ Scan complete</p>
              <p style="font-size:0.8rem;color:#555;margin:0.1rem 0 0;">${aiScore >= 90 ? 'Excellent condition' : aiScore >= 80 ? 'Good condition' : 'Acceptable condition'}</p>
            </div>
          </div>`;

        document.getElementById('publishBtn').removeAttribute('disabled');
        toast("Quality scan passed.");

      } catch (err) {
        zone.innerHTML = `<p style="color:#b91c1c;margin-top:0.5rem;">✕ Scan failed: ${err.message}</p>`;
        toast(`Scan error: ${err.message}`, 'error');
      }
    }

    // ── Upload images to Supabase Storage ────────────────────────
    async function uploadImages() {
      const urls = [];
      for (const file of pickedFiles) {
        const ext  = file.name.split('.').pop();
        const path = `listings/${currentUser.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error } = await sbClient.storage
          .from('listing-images')
          .upload(path, file, { contentType: file.type, upsert: false });

        if (error) {
          toast(`Image upload failed: ${error.message}`, 'error');
          return null;
        }

        const { data } = sbClient.storage.from('listing-images').getPublicUrl(path);
        urls.push(data.publicUrl);
      }
      return urls;
    }

    // ── Publish ───────────────────────────────────────────────────
    async function publishListing() {
      if (!scanPassed) {
        toast("Run the AI scan first.", 'error');
        return;
      }

      const title = document.getElementById('titleInput').value.trim();
      const price = parseFloat(document.getElementById('priceInput').value);

      if (!title || isNaN(price)) {
        toast("Title and price are required.", 'error');
        return;
      }

      document.getElementById('publishBtn').setAttribute('disabled', true);
      document.getElementById('publishBtn').textContent = "Publishing…";

      let imageUrls = ['placeholder.jpg'];
      if (pickedFiles.length > 0) {
        const uploaded = await uploadImages();
        if (!uploaded) {
          document.getElementById('publishBtn').removeAttribute('disabled');
          document.getElementById('publishBtn').textContent = "Publish Listing";
          return;
        }
        imageUrls = uploaded;
      }

      const meta   = currentUser.user_metadata || {};
      const school = meta.school || 'global';

      const payload = {
        title,
        description: document.getElementById('descInput').value.trim(),
        price,
        category:  document.getElementById('categoryInput').value,
        images:    imageUrls,
        seller_id: currentUser.id,
        school,
        status:    'available',
        ai_score:  aiScore
      };

      const { error } = await sbClient.from('listings').insert([payload]);

      if (!error) {
        toast("Listing published!");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
      } else {
        toast(`Failed to publish: ${error.message}`, 'error');
        document.getElementById('publishBtn').removeAttribute('disabled');
        document.getElementById('publishBtn').textContent = "Publish Listing";
      }
    }
  </script>
</body>
</html>
