<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Qurate — Campus Marketplace</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

:root{
  --bg:#ffffff;
  --ink:#0a0a0a;
  --ink2:#2a2a2a;
  --ink3:#666666;
  --navy:#072050;
  --blue:#0b3a79;
  --blue-mid:#1252a3;
  --blue-light:#C3E7FF;
  --blue-text:#072050;
  --on-dark:#ffffff;
  --on-dark2:rgba(195,231,255,0.80);
  --on-dark3:rgba(195,231,255,0.50);
  --border:rgba(11,58,121,0.13);
  --border-strong:rgba(11,58,121,0.28);
  --r-sm:6px;
  --r-md:12px;
  --r-lg:20px;
  --r-xl:28px;
  --primary:#1252a3;
  --primary-dark:#0b3a79;
  --primary-light:#dbeeff;
  --card:#ffffff;
  --secondary:#f0f5ff;
  --muted:#666666;
  --text:#0a0a0a;
  --radius:var(--r-md);
}

/* Layout */
.container{max-width:1100px;margin:0 auto;padding:0 1.25rem}

/* ── NAVBAR ── */
nav{
  position:sticky;top:0;z-index:50;
  background:#C3E7FF;
  border-bottom:1.5px solid rgba(11,58,121,0.18);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;cursor:pointer}
.logo-img{width:95px;height:50px;display:block;}
.logo-text{font-size:1.05rem;font-weight:700;letter-spacing:-.028em;color:var(--navy)}
.nav-links{display:flex;align-items:center;gap:.15rem}
.nav-link{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.42rem .75rem;border-radius:var(--r-sm);
  font-size:.85rem;font-weight:500;cursor:pointer;
  text-decoration:none;color:var(--navy);
  border:none;background:none;transition:all .15s;white-space:nowrap;
}
.nav-link:hover,.nav-link.active{background:rgba(7,32,80,0.1);color:var(--navy)}
.nav-actions{display:flex;align-items:center;gap:.45rem}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;text-align:center;gap:.4rem;
  padding:.5rem 1.1rem;border-radius:var(--r-sm);
  font-size:.875rem;font-weight:600;cursor:pointer;
  border:none;transition:all .15s;text-decoration:none;white-space:nowrap;
  line-height:1;vertical-align:middle;
}
.btn i,.btn svg{display:block;flex-shrink:0}
.btn-primary{background:var(--blue-mid);color:#fff}
.btn-primary:hover{background:var(--blue)}
.btn-outline{background:#fff;color:var(--ink2);border:1.5px solid var(--border-strong)}
.btn-outline:hover{border-color:var(--blue-mid);color:var(--blue-mid)}
.btn-ghost{background:none;color:var(--navy)}
.btn-ghost:hover{background:rgba(7,32,80,0.08);color:var(--navy)}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn-lg{padding:.7rem 1.45rem;font-size:.93rem}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fecaca}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── AVATAR ── */
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.78rem;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.35);cursor:pointer;
  user-select:none;
}
.avatar-lg{width:52px;height:52px;font-size:1rem}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.badge-secondary{background:var(--secondary);color:var(--ink3)}
.badge-primary{background:#dbeeff;color:var(--blue)}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef9c3;color:#ca8a04}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-outline{background:transparent;border:1px solid var(--border);color:var(--ink3)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.card-p{padding:1.25rem}

/* ── INPUTS ── */
.input,.textarea,.select{
  width:100%;padding:.6rem .9rem;
  border:1.5px solid var(--border-strong);
  border-radius:var(--r-sm);
  font-size:.875rem;font-family:inherit;
  color:var(--ink);background:#fff;outline:none;transition:border-color .15s;
}
.input:focus,.textarea:focus,.select:focus{border-color:var(--blue-mid)}
.textarea{resize:vertical;min-height:80px;line-height:1.5}
.label{font-size:.8rem;font-weight:600;color:var(--ink2);display:block;margin-bottom:.35rem}

/* ── LISTING GRID ── */
.listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:1rem}

/* ── LISTING CARD ── */
.listing-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:all .2s;
}
.listing-card:hover{border-color:var(--blue-mid);box-shadow:0 4px 20px rgba(18,82,163,.12);transform:translateY(-2px)}
.listing-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--secondary)}
.listing-img-placeholder{width:100%;aspect-ratio:1;background:var(--secondary);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.listing-body{padding:.9rem}
.listing-title{font-size:.85rem;font-weight:600;margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--ink2)}
.listing-price{font-size:.98rem;font-weight:700;color:var(--blue)}
.listing-meta{font-size:.73rem;color:var(--ink3);margin-top:.3rem}

/* ── BROWSER WINDOW ── */
.browser-window{
  border:1.5px solid rgba(11,58,121,0.2);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:0 24px 64px rgba(7,32,80,.12),0 4px 16px rgba(7,32,80,.07);
  background:#fff;
}
.browser-chrome{
  background:#e8ecf1;
  border-bottom:1px solid rgba(11,58,121,0.1);
  padding:.62rem 1rem;
  display:flex;align-items:center;gap:.75rem;
}
.browser-dots{display:flex;gap:.38rem;align-items:center;flex-shrink:0}
.browser-dot{width:12px;height:12px;border-radius:50%;display:block}
.browser-dot-r{background:#ff5f57}
.browser-dot-y{background:#febc2e}
.browser-dot-g{background:#28c840}
.browser-address{
  flex:1;max-width:300px;
  background:rgba(255,255,255,0.85);
  border:1px solid rgba(11,58,121,0.13);
  border-radius:6px;
  padding:.28rem .7rem;
  font-size:.72rem;color:var(--ink3);
  display:flex;align-items:center;gap:.38rem;
}
.browser-body{
  background:#f8fbff;
  max-height:460px;
  overflow:hidden;
  position:relative;
}
.browser-fade{
  position:absolute;bottom:0;left:0;right:0;
  height:110px;
  background:linear-gradient(transparent,#f8fbff 80%);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:1.25rem;
  pointer-events:none;
}
.browser-fade button{pointer-events:auto}

/* ── AI SCAN ── */
.quality-bar{height:6px;border-radius:3px;background:var(--secondary);overflow:hidden;margin:.5rem 0}
.quality-fill{height:100%;border-radius:3px;background:var(--blue-mid);transition:width .5s ease}
.progress{height:8px;background:var(--secondary);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--blue-mid);transition:width .4s ease}
.ai-scanning-bar{height:5px;border-radius:3px;overflow:hidden;background:rgba(11,58,121,0.1);margin-top:.75rem}
.ai-scanning-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7fc8f8,var(--blue-mid))}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast{background:var(--navy);color:#fff;padding:.75rem 1.1rem;border-radius:var(--r-md);font-size:.85rem;font-weight:500;max-width:320px;animation:slideIn .25s ease;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── DROPDOWN ── */
.dropdown{position:relative}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1.5px solid var(--border-strong);border-radius:var(--r-md);box-shadow:0 8px 32px rgba(7,32,80,.12);min-width:215px;padding:.35rem;z-index:100;display:none}
.dropdown-menu.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:.5rem;padding:.48rem .75rem;border-radius:var(--r-sm);font-size:.85rem;cursor:pointer;color:var(--ink2);border:none;background:none;width:100%;text-align:left;transition:background .1s}
.dropdown-item:hover{background:var(--secondary)}
.dropdown-sep{height:1px;background:var(--border);margin:.35rem 0}
.dropdown-label{padding:.4rem .75rem .3rem;font-size:.78rem;font-weight:600;color:var(--ink2);line-height:1.5}

/* ── DIALOG ── */
.overlay{position:fixed;inset:0;background:rgba(7,32,80,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.dialog{background:#fff;border-radius:var(--r-lg);padding:1.5rem;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(7,32,80,.2)}
.dialog h3{font-size:1.1rem;font-weight:700;margin-bottom:.35rem;color:var(--navy)}
.dialog p{font-size:.875rem;color:var(--ink3);margin-bottom:1rem;line-height:1.6}

/* ── UTILS ── */
.sep{height:1px;background:var(--border);margin:1rem 0}
.section{padding:3rem 0}
.section-sm{padding:1.5rem 0}
.stars{display:flex;gap:2px;color:#f59e0b}

/* ── VALUE CARDS ── */
.value-icon{width:38px;height:38px;background:#dbeeff;color:var(--blue);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.filter-row .input,.filter-row .select{width:auto;flex:1;min-width:130px}
.search-wrap{position:relative;flex:2;min-width:200px}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.search-wrap .input{padding-left:2.3rem}

/* ── LISTING DETAIL ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}}
.detail-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r-md);border:1.5px solid var(--border);background:var(--secondary)}
.detail-price{font-size:2rem;font-weight:700;color:var(--blue)}

/* ── AI PANEL ── */
.ai-panel{background:#f5f9ff;border:1.5px solid rgba(11,58,121,0.12);border-radius:var(--r-md);padding:1rem}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.ai-score{font-size:1.6rem;font-weight:700;color:var(--blue)}

/* ── SELLER CARD ── */
.seller-card{display:flex;align-items:center;gap:.85rem;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-md);padding:.9rem;cursor:pointer;transition:border-color .15s}
.seller-card:hover{border-color:var(--blue-mid)}

/* ── DASHBOARD ── */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-md);padding:1rem}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--blue)}
.stat-label{font-size:.78rem;color:var(--ink3);margin-top:.2rem}
.buyer-row{display:flex;align-items:flex-start;gap:.75rem;padding:.9rem;border-radius:var(--r-sm);border:1.5px solid var(--border);margin-bottom:.5rem;background:#fff}

/* ── FORM ── */
.form-group{margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:540px){.form-row{grid-template-columns:1fr}}
.upload-area{border:2px dashed var(--border-strong);border-radius:var(--r-md);padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--secondary)}
.upload-area:hover{border-color:var(--blue-mid);background:#dbeeff}
.image-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.75rem}
.image-thumb{position:relative;aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;background:var(--secondary)}
.image-thumb img{width:100%;height:100%;object-fit:cover}
.image-thumb .remove-btn{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;border:none;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}

/* ── FLEXBOX UTILS ── */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.gap-1{gap:.25rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.text-muted{color:var(--ink3)}.text-sm{font-size:.875rem}.text-xs{font-size:.75rem}.text-lg{font-size:1.1rem}
.font-semibold{font-weight:600}.font-bold{font-weight:700}
.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-4{margin-top:1rem}.mt-6{margin-top:1.5rem}
.mb-1{margin-bottom:.25rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}
.py-2{padding-top:.5rem;padding-bottom:.5rem}.px-4{padding-left:1rem;padding-right:1rem}
.w-full{width:100%}.hidden{display:none!important}
.rounded{border-radius:var(--r-md)}.rounded-full{border-radius:50%}
.bg-secondary{background:var(--secondary)}.border-t{border-top:1px solid var(--border)}
.text-center{text-align:center}.text-primary{color:var(--blue)}
.capitalize{text-transform:capitalize}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CHIP ── */
.chip-row{display:flex;gap:.5rem;flex-wrap:wrap;margin:.75rem 0}
.chip{padding:.35rem .85rem;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border-strong);background:#fff;transition:all .15s}
.chip:hover,.chip.active{border-color:var(--blue-mid);background:#dbeeff;color:var(--blue)}

/* ── TABS ── */
.tabs{display:flex;gap:.25rem;border-bottom:2px solid var(--border);margin-bottom:1.25rem}
.tab{padding:.6rem 1rem;font-size:.875rem;font-weight:500;cursor:pointer;color:var(--ink3);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── PROFILE ── */
.profile-header{display:flex;align-items:flex-start;gap:1.25rem;padding:1.5rem;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-md);margin-bottom:1.25rem}
.profile-info h2{font-size:1.2rem;font-weight:700;color:var(--navy)}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:1.5rem}
.page-title{font-size:1.6rem;font-weight:700;letter-spacing:-.02em;color:var(--navy)}
.page-sub{font-size:.875rem;color:var(--ink3);margin-top:.3rem}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--ink3);font-size:.875rem;cursor:pointer;border:none;background:none;padding:.35rem 0;margin-bottom:1rem;transition:color .15s}
.back-btn:hover{color:var(--ink)}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;border:2px dashed var(--border);border-radius:var(--r-md);text-align:center;color:var(--ink3)}
.empty p{margin-top:.5rem;font-size:.875rem}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:.75rem;color:var(--ink3);font-size:.8rem;margin:1rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── ANIMATIONS ── */
.page-view{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .nav-links{display:none}
  .hide-mobile{display:none!important}
  .listing-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// ── HELPERS ──
function getUser(id){return users.find(u=>u.id===id)}
function getCampusName(id){return campuses.find(c=>c.id===id)?.shortName||'Campus'}
function getListing(id){return listings.find(l=>l.id===id)}
function campusListings(){
  if(!currentUserId)return[];
  const u=getUser(currentUserId);
  return listings.filter(l=>l.campusId===u.campusId&&l.sellerId!==currentUserId);
}
function myListings(){if(!currentUserId)return[];return listings.filter(l=>l.sellerId===currentUserId)}
function interestsForListing(lid){return interests.filter(i=>i.listingId===lid)}
function reviewsForUser(uid){return reviews.filter(r=>r.toUserId===uid)}
function hasInterest(lid){if(!currentUserId)return false;return interests.some(i=>i.listingId===lid&&i.buyerId===currentUserId)}
function initials(name){return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}
function genId(p){return p+'_'+Math.random().toString(36).slice(2,8)}
function qualityTone(score){
  if(score>=90)return{label:'Like new condition',cls:'badge-green'};
  if(score>=78)return{label:'Good condition',cls:'badge-primary'};
  return{label:'Fair condition',cls:'badge-yellow'};
}
function stars(r){return Array(5).fill(0).map((_,i)=>`<i data-lucide="star" style="width:13px;height:13px;fill:${i<Math.round(r)?'#f59e0b':'none'};color:#f59e0b"></i>`).join('')}
function statusBadge(s){
  if(s==='reserved')return`<span class="badge badge-yellow">Reserved</span>`;
  if(s==='sold')return`<span class="badge badge-red">Sold</span>`;
  return`<span class="badge badge-green">Available</span>`;
}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch{return d}}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function navigate(view, params={}){
  sellScanning=false; // reset scan state so navigating away and back works cleanly

  currentView=view;
  currentParams=params;
  window.scrollTo(0,0);
  render();
}

// TOAST
// ══════════════════════════════════════════
function toast(msg, type='success'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{
    t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all .3s';
    setTimeout(()=>t.remove(),300);
  },3000);
}

// BROWSE
// ══════════════════════════════════════════
function viewBrowse(){
  if(!currentUserId)return viewAuthGate('Log in to browse listings from your campus.','browse');
  const u=getUser(currentUserId);
  let items=campusListings();
  if(browseQuery.trim()){const q=browseQuery.toLowerCase();items=items.filter(l=>l.title.toLowerCase().includes(q)||l.description.toLowerCase().includes(q))}
  if(browseCategory!=='all')items=items.filter(l=>l.category===browseCategory);
  items=[...items].sort((a,b)=>{
    if(browseSort==='price-low')return a.price-b.price;
    if(browseSort==='price-high')return b.price-a.price;
    if(browseSort==='quality')return b.aiCheck.score-a.aiCheck.score;
    return b.createdAt.localeCompare(a.createdAt);
  });
  return`
  <main class="page-view">
    <div class="container" style="padding-top:2rem;padding-bottom:3rem">
      <div class="page-header">
        <div class="flex items-center gap-1 text-sm" style="margin-bottom:.3rem;color:var(--blue)">
          <i data-lucide="map-pin" style="width:14px;height:14px"></i>
          <span style="font-weight:600">${getCampusName(u.campusId)} campus</span>
        </div>
        <h1 class="page-title">Browse the marketplace</h1>
        <p class="page-sub">Items listed by verified students at your college. Meet-up only.</p>
      </div>
      <div class="filter-row">
        <div class="search-wrap">
          <span class="search-icon"><i data-lucide="search" style="width:16px;height:16px"></i></span>
          <input class="input" placeholder="Search textbooks, electronics, furniture..." value="${escHtml(browseQuery)}" oninput="browseQuery=this.value;reRender()"/>
        </div>
        <select class="select" style="width:160px" onchange="browseCategory=this.value;reRender()">
          <option value="all" ${browseCategory==='all'?'selected':''}>All categories</option>
          ${categories.map(c=>`<option value="${c}" ${browseCategory===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <select class="select" style="width:170px" onchange="browseSort=this.value;reRender()">
          <option value="recent" ${browseSort==='recent'?'selected':''}>Most recent</option>
          <option value="price-low" ${browseSort==='price-low'?'selected':''}>Price: low → high</option>
          <option value="price-high" ${browseSort==='price-high'?'selected':''}>Price: high → low</option>
          <option value="quality" ${browseSort==='quality'?'selected':''}>Highest AI score</option>
        </select>
      </div>
      <p class="text-sm text-muted mb-3">${items.length} ${items.length===1?'item':'items'} available</p>
      ${items.length>0?`<div class="listing-grid">${items.map(l=>listingCard(l)).join('')}</div>`:`
        <div class="empty">
          <i data-lucide="search-x" style="width:40px;height:40px;opacity:.3"></i>
          <p style="font-weight:600;margin-top:.75rem">No items match your search</p>
          <p>Try a different category or clear your filters.</p>
        </div>
      `}
    </div>
  </main>`;
}
function listingCard(l){
  const tone=qualityTone(l.aiCheck.score);
  return`<div class="listing-card" onclick="navigate('listing',{id:'${l.id}'})">
    <img class="listing-img" src="${l.images[0]}" alt="${escHtml(l.title)}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="listing-img-placeholder" style="display:none">📦</div>
    <div class="listing-body">
      ${l.status!=='available'?`<div style="margin-bottom:.35rem">${statusBadge(l.status)}</div>`:''}
      <div class="listing-title">${escHtml(l.title)}</div>
      <div class="listing-price">$${l.price}</div>
      <div class="flex items-center gap-1 mt-1" style="flex-wrap:wrap">
        <span class="badge ${tone.cls}" style="font-size:.68rem">${l.aiCheck.score}/100</span>
        <span class="badge badge-secondary">${l.condition}</span>
      </div>
      <div class="listing-meta">${l.category}</div>
    </div>
  </div>`;
}

function addSamplePhoto(){
  if(sellScanning)return;
  if(sellImages.length>=4){toast('Maximum 4 photos allowed','error');return}
  const remaining=samplePhotos.filter(p=>!sellImages.includes(p));
  if(!remaining.length)return;
  sellImages=[...sellImages,remaining[0]];
  sellAiCheck=null;
  reRender();
}
function removeSellPhoto(i){
  if(sellScanning)return;
  sellImages=sellImages.filter((_,idx)=>idx!==i);
  sellAiCheck=null;
  reRender();
}

// ── AI SCAN — 5 second delay, then done ──
function startAiScan(){
  if(sellImages.length===0){toast('Add at least one photo first','error');return}
  if(sellScanning)return;

  sellScanning=true;

  const zone=document.getElementById('aiCheckZone');
  if(!zone)return;

  zone.innerHTML=`
    <div class="ai-panel" style="padding:1.25rem">
      <div class="flex items-center gap-3">
        <div class="value-icon" style="width:36px;height:36px;flex-shrink:0">
          <i data-lucide="scan-line" style="width:18px;height:18px;animation:spin 1.5s linear infinite"></i>
        </div>
        <div>
          <p style="font-weight:600;color:var(--navy);font-size:.9rem">Scanning photos…</p>
          <p class="text-xs text-muted mt-1">This will take a few seconds</p>
        </div>
      </div>
    </div>`;
  lucide.createIcons();

  setTimeout(()=>{
    if(!sellScanning)return;
    sellAiCheck=buildAiCheck(sellImages.length);
    sellScanning=false;
    reRender();
    toast('AI check complete ✓');
  }, 5000);
}

function buildAiCheck(imageCount){
  const base = 72 + Math.min(imageCount, 4) * 5;
  const score = Math.max(70, Math.min(97, base + Math.floor(Math.random() * 6)));
  const condition = score>=92?'Like New':score>=84?'Excellent':score>=72?'Good':'Fair';
  const highlights = ['Clear, well-lit photos','No major scratches detected','Item matches the description'].slice(0, score>=90?3:2);
  const flags = score>=88?[]:['Consider a close-up of any visible wear'];
  const summary = score>=90
    ? 'Photos indicate an item in excellent shape with no notable issues found.'
    : 'Item looks well-kept with only minor, normal signs of use.';
  return {score, condition, summary, highlights, flags};
}

function publishListing(){
  if(!sellTitle.trim()||!sellPrice||!sellCategory||!sellAiCheck||sellScanning)return;
  const u=getUser(currentUserId);
  listings.unshift({

}

                  <div class="stars">${stars(r.rating)}</div>
                </div>
                <span class="text-xs text-muted" style="margin-left:auto">${fmtDate(r.createdAt)}</span>
              </div>
              <p class="text-sm" style="line-height:1.65;margin-top:.5rem">${escHtml(r.comment)}</p>
            </div>
          `}).join('')}
        </div>
      `:`<div class="empty"><i data-lucide="star" style="width:32px;height:32px;opacity:.3"></i><p class="mt-2">No reviews yet</p></div>`}
    </div>
  </main>`;
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
let loginEmail='',loginError='';
function viewLogin(){
  return`
  <main class="page-view">
    <div class="container" style="display:flex;justify-content:center;padding-top:4rem;padding-bottom:4rem">
      <div style="max-width:400px;width:100%">
        <div style="text-align:center;margin-bottom:2rem">
          <div style="width:48px;height:48px;background:#dbeeff;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem">
            <i data-lucide="store" style="width:22px;height:22px;color:var(--blue)"></i>
          </div>
          <h2 style="font-size:1.45rem;font-weight:700;color:var(--navy)">Welcome back</h2>
          <p class="text-muted text-sm mt-1">Log in with your student email</p>
        </div>
        <div class="card card-p">
          ${loginError?`<div style="background:#fee2e2;color:#dc2626;padding:.65rem .85rem;border-radius:var(--r-sm);font-size:.85rem;margin-bottom:1rem">${loginError}</div>`:''}
          <div class="form-group">
            <label class="label">Email address</label>
            <input class="input" type="email" placeholder="yourname@university.edu"
              value="${escHtml(loginEmail)}" oninput="loginEmail=this.value"
              onkeydown="if(event.key==='Enter')doLogin()"/>
          </div>
          <button class="btn btn-primary w-full" style="padding:.65rem" onclick="doLogin()">Log in</button>
          <div class="divider">or try a demo account</div>
          <div style="display:flex;flex-direction:column;gap:.35rem">
            ${users.slice(0,3).map(u=>`
              <button class="btn btn-outline btn-sm" style="justify-content:flex-start;gap:.6rem" onclick="quickLogin('${u.email}')">
                <div class="avatar" style="width:24px;height:24px;font-size:.6rem;border:none">${initials(u.name)}</div>
                ${escHtml(u.name)} <span class="text-xs text-muted">${getCampusName(u.campusId)}</span>
              </button>`).join('')}
          </div>
        </div>
        <p class="text-center text-sm text-muted mt-3">Don't have an account? <button style="background:none;border:none;cursor:pointer;font-weight:600;color:var(--blue)" onclick="navigate('signup')">Sign up</button></p>
      </div>
    </div>
  </main>`;
}
function doLogin(){
  const found=users.find(u=>u.email.toLowerCase()===loginEmail.toLowerCase());
  if(found){
    currentUserId=found.id;loginEmail='';loginError='';
    toast('Welcome back, '+found.name+'!');
    navigate('browse');
  } else {
    loginError='No account found with that email. Try a demo account below.';
    reRender();
  }
}
function quickLogin(email){loginEmail=email;doLogin()}

// ══════════════════════════════════════════
// SIGNUP
// ══════════════════════════════════════════
let signupName='',signupEmail='',signupCampus='c1',signupError='';
function viewSignup(){
  return`
  <main class="page-view">
    <div class="container" style="display:flex;justify-content:center;padding-top:4rem;padding-bottom:4rem">
      <div style="max-width:420px;width:100%">
        <div style="text-align:center;margin-bottom:2rem">
          <div style="width:48px;height:48px;background:#dbeeff;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem">
            <i data-lucide="user-plus" style="width:22px;height:22px;color:var(--blue)"></i>
          </div>
          <h2 style="font-size:1.45rem;font-weight:700;color:var(--navy)">Join Qurate</h2>
          <p class="text-muted text-sm mt-1">Create your verified student account</p>
        </div>
        <div class="card card-p">
          ${signupError?`<div style="background:#fee2e2;color:#dc2626;padding:.65rem .85rem;border-radius:var(--r-sm);font-size:.85rem;margin-bottom:1rem">${signupError}</div>`:''}
          <div class="form-group">
            <label class="label">Full name</label>
            <input class="input" placeholder="Your name" value="${escHtml(signupName)}" oninput="signupName=this.value"/>
          </div>
          <div class="form-group">
            <label class="label">University email</label>
            <input class="input" type="email" placeholder="yourname@university.edu" value="${escHtml(signupEmail)}" oninput="signupEmail=this.value"/>
          </div>
          <div class="form-group">
            <label class="label">Your campus</label>
            <select class="select" onchange="signupCampus=this.value">
              ${campuses.map(c=>`<option value="${c.id}" ${signupCampus===c.id?'selected':''}>${c.name}</option>`).join('')}
            </select>
          </div>
          <button class="btn btn-primary w-full" style="padding:.65rem" onclick="doSignup()">Create account</button>
        </div>
        <p class="text-center text-sm text-muted mt-3">Already have an account? <button style="background:none;border:none;cursor:pointer;font-weight:600;color:var(--blue)" onclick="navigate('login')">Log in</button></p>
      </div>
    </div>
  </main>`;
}
function doSignup(){
  if(!signupName.trim()){signupError='Please enter your name.';reRender();return}
  if(!signupEmail.includes('@')){signupError='Please enter a valid email address.';reRender();return}
  if(users.find(u=>u.email.toLowerCase()===signupEmail.toLowerCase())){signupError='An account with that email already exists.';reRender();return}
  const id=genId('u');
  const name=signupName.trim();
  users.push({id,name,email:signupEmail,phone:'+00 0000 0000',campusId:signupCampus,bio:'New to Qurate.',rating:0,reviewCount:0,joinedAt:new Date().toISOString().slice(0,10)});
  currentUserId=id;signupName='';signupEmail='';signupError='';
  toast('Welcome to Qurate, '+name+'! 🎉');
  navigate('browse');
}

// ══════════════════════════════════════════
// AUTH GATE
// ══════════════════════════════════════════
function viewAuthGate(msg,returnTo){
  return`
  <main class="page-view">
    <div class="container" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 1rem;text-align:center">
      <div class="value-icon" style="width:50px;height:50px;margin-bottom:1rem">
        <i data-lucide="lock" style="width:22px;height:22px"></i>
      </div>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.5rem;color:var(--navy)">Sign in required</h2>

      <div class="flex gap-2">
        <button class="btn btn-primary" onclick="navigate('login')">Log in</button>
        <button class="btn btn-outline" onclick="navigate('signup')">Join free</button>
      </div>
    </div>
  </main>`;
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
function logout(){
  currentUserId=null;
  resetSell();
  browseQuery='';browseCategory='all';browseSort='recent';
  dashTab='listings';
  toast('Logged out.');
  navigate('home');
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function reRender(){render()}
function render(){
  const app=document.getElementById('app');
  let html='';
  if(currentView==='home')         html=viewHome();
  else if(currentView==='browse')  html=viewBrowse();
  else if(currentView==='listing') html=viewListing();
  else if(currentView==='sell')    html=viewSell();
  else if(currentView==='dashboard')html=viewDashboard();
  else if(currentView==='profile') html=viewProfile();
  else if(currentView==='login')   html=viewLogin();
  else if(currentView==='signup')  html=viewSignup();
  else                             html=viewHome();
  app.innerHTML=html;
  renderNav();
  lucide.createIcons();
}
if(typeof lucide !== 'undefined') {
  render();
} else {
  document.querySelector('script[src*="lucide"]').addEventListener('load', render);
}
</script>
</body>
</html>
