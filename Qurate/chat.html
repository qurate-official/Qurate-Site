<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Qurate</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .chat-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 2rem;
      padding-bottom: 2rem;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
    }
    .chat-header {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .chat-header-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--secondary);
      flex-shrink: 0;
    }
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-title { font-weight: 700; color: var(--navy); font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header-sub { font-size: 0.78rem; color: var(--ink3); margin-top: 0.15rem; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.25rem 0 1rem;
    }
    .enquiry-bubble {
      background: #f0f4ff;
      border: 1.5px solid rgba(11,58,121,0.12);
      border-radius: var(--r-md);
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
    }
    .enquiry-bubble .enq-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--blue-mid);
      margin-bottom: 0.35rem;
      display: block;
    }
    .enquiry-bubble .enq-body {
      font-size: 0.9rem;
      color: var(--ink2);
      line-height: 1.5;
    }
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .msg-avatar.theirs { background: var(--blue-mid); }
    .msg-bubble {
      max-width: 72%;
      padding: 0.6rem 0.9rem;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .msg-row.mine .msg-bubble {
      background: var(--blue-mid);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.theirs .msg-bubble {
      background: #f0f4ff;
      color: var(--ink2);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 0.65rem;
      color: var(--ink3);
      margin-top: 0.2rem;
      text-align: right;
    }
    .msg-row.theirs .msg-time { text-align: left; }
    .chat-input-bar {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      padding-top: 0.75rem;
      border-top: 1.5px solid var(--border);
    }
    .chat-input-bar textarea {
      flex: 1;
      resize: none;
      padding: 0.6rem 0.9rem;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-sm);
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }
    .chat-input-bar textarea:focus { border-color: var(--blue-mid); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--blue-mid);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { background: var(--blue); }
    .date-divider {
      text-align: center;
      font-size: 0.7rem;
      color: var(--ink3);
      margin: 0.5rem 0;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a class="logo" href="dashboard.html">
          <img class="logo-img" src="../items/logo.jpeg" alt="Qurate logo" onerror="this.style.display='none'"/>
        </a>
        <div class="nav-actions">
          <a class="btn btn-outline btn-sm" href="dashboard.html">← Back</a>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Log out</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="chat-wrap">

      <div id="loadingState" style="padding:4rem 0;text-align:center;color:var(--ink3);">Loading chat…</div>

      <div id="chatContent" style="display:none;flex:1;flex-direction:column;min-height:0;height:100%;">
        <div class="chat-header" id="chatHeader"></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
          <textarea id="msgInput" rows="1" placeholder="Type a message…"
            oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <i data-lucide="send" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>

      <div id="errorState" style="display:none;padding:4rem 0;text-align:center;color:#b91c1c;">Chat not found.</div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="supabaseClient.js"></script>
  <script>
    var currentUser = null;
    var interest    = null;
    var listing     = null;
    var realtimeSub = null;

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await sbClient.auth.signOut();
      window.location.href = "auth.html";
    });

    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = await checkUserSession();
      if (!currentUser) return;

      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      console.log('user:', currentUser.id, 'interest id:', id);
      if (!id) { showError(); return; }

      var res1 = await sbClient.from('interests').select('*').eq('id', id).single();
      console.log('interest fetch:', res1.data, res1.error);
      if (res1.error || !res1.data) { showError(); return; }
      interest = res1.data;

      var res2 = await sbClient.from('listings').select('id, title, price, images, seller_id').eq('id', interest.listing_id).single();
      console.log('listing fetch:', res2.data, res2.error);
      listing = res2.data;

      renderHeader();
      await loadMessages();
      subscribeRealtime();

      document.getElementById('loadingState').style.display = 'none';
      var cc = document.getElementById('chatContent');
      cc.style.cssText = 'display:flex;flex:1;flex-direction:column;min-height:0;height:100%;';
      lucide.createIcons();
      scrollToBottom();
    });

    function renderHeader() {
      var isSeller = listing && listing.seller_id === currentUser.id;
      var otherName = isSeller
        ? (interest.buyer_name || interest.buyer_email || 'Buyer')
        : 'Seller';

      document.getElementById('chatHeader').innerHTML =
        '<img class="chat-header-thumb" src="' + (listing && listing.images && listing.images[0] ? listing.images[0] : 'placeholder.jpg') + '" alt="" onclick="window.open(\'listing.html?id=' + (listing ? listing.id : '') + '\',\'_blank\')" style="cursor:pointer;">' +
        '<div class="chat-header-info">' +
          '<div class="chat-header-title">' + (listing ? listing.title : 'Listing') + '</div>' +
          '<div class="chat-header-sub">₹' + (listing ? listing.price : '') + ' · Chat with ' + otherName + '</div>' +
        '</div>' +
        '<a class="btn btn-outline btn-sm" href="listing.html?id=' + (listing ? listing.id : '') + '" target="_blank">View listing</a>';
    }

    async function loadMessages() {
      var res = await sbClient.from('messages').select('*').eq('interest_id', interest.id).order('created_at', { ascending: true });
      if (res.error) { toast('Failed to load messages.', 'error'); return; }
      renderMessages(res.data || []);
    }

    function renderMessages(msgs) {
      var container = document.getElementById('chatMessages');
      var html = '<div class="enquiry-bubble">' +
        '<span class="enq-label">Initial Enquiry · ' + new Date(interest.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) + '</span>' +
        '<div class="enq-body">' + escHtml(interest.note) + '</div>' +
        '</div>';

      var lastDate = '';
      msgs.forEach(function(msg) {
        var mine = msg.sender_id === currentUser.id;
        var d = new Date(msg.created_at);
        var dateStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

        if (dateStr !== lastDate) {
          html += '<div class="date-divider">' + dateStr + '</div>';
          lastDate = dateStr;
        }

        var initials = mine ? getMineInitials() : getTheirsInitials();

        html += '<div class="msg-row ' + (mine ? 'mine' : 'theirs') + '">' +
          '<div class="msg-avatar ' + (mine ? 'mine' : 'theirs') + '">' + initials + '</div>' +
          '<div>' +
            '<div class="msg-bubble">' + escHtml(msg.body) + '</div>' +
            '<div class="msg-time">' + timeStr + '</div>' +
          '</div>' +
          '</div>';
      });

      container.innerHTML = html;
    }

    function getMineInitials() {
      var meta = currentUser.user_metadata || {};
      var f = (meta.first_name || '')[0] || '';
      var l = (meta.last_name  || '')[0] || '';
      return (f + l).toUpperCase() || '?';
    }

    function getTheirsInitials() {
      if (interest.buyer_name) {
        var parts = interest.buyer_name.trim().split(' ');
        return ((parts[0] || '')[0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
      }
      return (interest.buyer_email ? interest.buyer_email[0] : 'U').toUpperCase();
    }

    function subscribeRealtime() {
      realtimeSub = sbClient
        .channel('messages_' + interest.id)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: 'interest_id=eq.' + interest.id
        }, function() {
          loadMessages().then(scrollToBottom);
        })
        .subscribe();
    }

    async function sendMessage() {
      var input = document.getElementById('msgInput');
      var body = input.value.trim();
      if (!body) return;

      var btn = document.getElementById('sendBtn');
      btn.disabled = true;

      var res = await sbClient.from('messages').insert([{
        interest_id: interest.id,
        sender_id:   currentUser.id,
        body:        body
      }]);

      if (res.error) {
        toast('Failed to send: ' + res.error.message, 'error');
      } else {
        input.value = '';
        input.style.height = 'auto';
        await loadMessages();
        scrollToBottom();
      }

      btn.disabled = false;
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function scrollToBottom() {
      var c = document.getElementById('chatMessages');
      if (c) c.scrollTop = c.scrollHeight;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showError() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display   = 'block';
    }
  </script>
</body>
</html>
